backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:

  # ── Portfolio ──────────────────────────────────────────────────────────────
  - name: "portfolio"
    label: "Portfolio"
    label_singular: "Portfolio Item"
    description: "Add, edit, or remove Before & After project photos shown on the website."
    folder: "public/portfolio"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "label"
    summary: "{{label}} — {{detail}}"
    fields:
      - label: "Project Title"
        name: "label"
        widget: "string"
        hint: "e.g. Victorian Parlour Chair, Farmhouse Dining Table"

      - label: "Work Description"
        name: "detail"
        widget: "string"
        hint: "Brief summary of repairs done, e.g. Reglued joints · Finish restored"

      - label: "Before Photo"
        name: "before"
        widget: "image"
        hint: "Upload a clear photo of the furniture BEFORE repair."

      - label: "After Photo"
        name: "after"
        widget: "image"
        hint: "Upload a clear photo of the furniture AFTER repair."

      - label: "Wide Card (spans 2 columns on desktop)"
        name: "wide"
        widget: "boolean"
        default: false
        hint: "Turn on to make this card wider. Alternate wide and narrow cards for best results."

      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Lower numbers appear first. Use 1, 2, 3... to control the order."

  # ── Reviews ────────────────────────────────────────────────────────────────
  - name: "reviews"
    label: "Reviews"
    label_singular: "Review"
    description: "Add, edit, or remove customer reviews shown on the website."
    folder: "public/reviews"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "name"
    summary: "{{name}} — {{location}}"
    fields:
      - label: "Customer Name"
        name: "name"
        widget: "string"
        hint: "e.g. Sarah M."

      - label: "Location"
        name: "location"
        widget: "string"
        hint: "e.g. Cherry Creek, Denver"

      - label: "Review Text"
        name: "text"
        widget: "text"
        hint: "The customer's review. Keep it authentic and concise."

      - label: "Star Rating"
        name: "rating"
        widget: "select"
        options: ["5", "4", "3"]
        default: "5"
        hint: "Number of stars (we recommend only showing 4-5 star reviews)"

      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Lower numbers appear first."
