<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Thornton Timber Restoration — Denver's trusted furniture repair and antique restoration specialists. Serving the Denver metro area for 25+ years." />
    <title>Thornton Timber Restoration | Denver Furniture Repair</title>

    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║           NETLIFY FORM DETECTION — REQUIRED SNIPPET         ║
      ║                                                              ║
      ║  Netlify's build bots scan static HTML for forms. Because    ║
      ║  React renders forms client-side (post-build), Netlify       ║
      ║  never sees them. The fix: paste an IDENTICAL hidden form    ║
      ║  here in the static HTML. Netlify registers it; React's      ║
      ║  form POSTs to it at runtime. The hidden attribute means     ║
      ║  users never see it.                                         ║
      ╚══════════════════════════════════════════════════════════════╝
    -->
    <form name="thornton-quote" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"  name="name"        />
      <input type="email" name="email"       />
      <input type="tel"   name="phone"       />
      <textarea           name="description" ></textarea>
      <input type="file"  name="image"       />
    </form>
    <!-- END NETLIFY FORM DETECTION SNIPPET -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
